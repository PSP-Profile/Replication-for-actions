  - id: DJANGO-OWASP-CACHE-POISONING-UNVALIDATED
    message: >
      This code uses user input directly in cache keys without validation. Attackers can
      craft cache keys that overwrite legitimate cached data or cause cache collisions,
      potentially serving malicious content to other users.
      Validate and sanitize cache keys, or use deterministic key generation that doesn't
      rely directly on user input. See the Cache Poisoning Cheat Sheet for prevention strategies.
    severity: WARNING
    languages: [python]
    mode: taint
    metadata:
      category: security
      cwe: "CWE-444"
      references:
        - "https://cheatsheetseries.owasp.org/cheatsheets/Cache_Poisoning_Cheat_Sheet.html "
